<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Drop & Play — Frame Extractor</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,300&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --surface2: #16161f;
      --border: #1e1e2e;
      --accent: #e8ff47;
      --accent2: #ff4f7b;
      --green: #50ffa0;
      --text: #f0f0f8;
      --muted: #555570;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1.5rem 5rem;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(232,255,71,0.07) 0%, transparent 60%),
                  radial-gradient(ellipse 50% 40% at 85% 85%, rgba(255,79,123,0.06) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
      animation: fadeUp 0.6s ease both;
      position: relative;
      z-index: 1;
    }

    header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 8vw, 5.5rem);
      letter-spacing: 0.05em;
      line-height: 1;
      background: linear-gradient(135deg, var(--accent) 0%, #fff 70%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header p {
      color: var(--muted);
      font-size: 0.9rem;
      margin-top: 0.4rem;
      letter-spacing: 0.05em;
    }

    /* ─── Upload Zone ─── */
    .upload-area {
      width: 100%;
      max-width: 640px;
      background: var(--surface);
      border: 2px dashed var(--border);
      border-radius: 20px;
      padding: 3.5rem 2rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.25s, background 0.25s, transform 0.2s;
      position: relative;
      z-index: 1;
      animation: fadeUp 0.6s 0.1s ease both;
    }

    .upload-area:hover,
    .upload-area.drag-over {
      border-color: var(--accent);
      background: rgba(232,255,71,0.04);
      transform: scale(1.01);
    }

    .upload-area.drag-over .drop-icon { transform: translateY(-8px) scale(1.15); }

    .drop-icon {
      font-size: 3rem;
      display: block;
      margin-bottom: 1rem;
      transition: transform 0.3s ease;
    }

    .upload-area h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.7rem;
      letter-spacing: 0.08em;
      margin-bottom: 0.4rem;
    }

    .upload-area p { color: var(--muted); font-size: 0.87rem; margin-bottom: 1.25rem; }
    .upload-area p span { color: var(--accent); font-weight: 500; }

    .browse-btn {
      background: var(--accent);
      color: #0a0a0f;
      font-family: 'DM Sans', sans-serif;
      font-weight: 700;
      font-size: 0.82rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.6rem 1.6rem;
      border-radius: 100px;
      border: none;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
    }
    .browse-btn:hover { background: #d4e83e; transform: translateY(-1px); }

    #file-input { display: none; }

    /* ─── Settings Row ─── */
    .settings-row {
      width: 100%;
      max-width: 640px;
      display: none;
      gap: 0.75rem;
      margin-top: 1rem;
      z-index: 1;
      animation: fadeUp 0.4s ease both;
    }

    .setting-box {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.85rem 1rem;
    }

    .setting-box label {
      display: block;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 0.3rem;
    }

    .setting-box input[type=range] {
      width: 100%;
      accent-color: var(--accent);
    }

    .setting-val {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.2rem;
      color: var(--accent);
      letter-spacing: 0.05em;
    }

    /* ─── File Card ─── */
    .file-card {
      width: 100%;
      max-width: 640px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.1rem 1.4rem;
      margin-top: 1rem;
      display: none;
      align-items: center;
      gap: 1rem;
      z-index: 1;
      animation: fadeUp 0.4s ease both;
    }

    .file-thumb-wrap {
      width: 68px; height: 48px;
      border-radius: 8px;
      background: var(--border);
      overflow: hidden;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem;
    }

    .file-thumb-wrap video { width: 100%; height: 100%; object-fit: cover; }

    .file-meta { flex: 1; overflow: hidden; }
    .file-name { font-size: 0.88rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .file-size { font-size: 0.76rem; color: var(--muted); margin-top: 0.15rem; }

    .status-badge {
      font-size: 0.72rem; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      padding: 0.28rem 0.75rem; border-radius: 100px; white-space: nowrap;
    }
    .badge-ready { background: rgba(232,255,71,0.1); color: var(--accent); }
    .badge-uploading { background: rgba(255,79,123,0.1); color: var(--accent2); }
    .badge-processing { background: rgba(255,160,50,0.1); color: #ffa032; }
    .badge-done { background: rgba(80,255,160,0.1); color: var(--green); }
    .badge-error { background: rgba(255,80,80,0.1); color: #ff5050; }

    /* ─── Progress ─── */
    .progress-wrap {
      width: 100%; max-width: 640px;
      margin-top: 0.75rem;
      display: none;
      z-index: 1;
      animation: fadeUp 0.4s ease both;
    }

    .progress-label {
      display: flex; justify-content: space-between;
      font-size: 0.78rem; color: var(--muted); margin-bottom: 0.4rem;
    }

    .progress-bar { height: 3px; background: var(--border); border-radius: 100px; overflow: hidden; }
    .progress-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 100px;
      transition: width 0.2s ease;
    }

    /* ─── Action Buttons ─── */
    .action-row {
      width: 100%; max-width: 640px;
      display: none; gap: 0.75rem;
      margin-top: 0.75rem;
      z-index: 1;
    }

    .extract-btn {
      flex: 1;
      padding: 0.8rem;
      background: linear-gradient(135deg, var(--accent), #c8f500);
      color: #0a0a0f;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.05rem;
      letter-spacing: 0.15em;
      border: none; border-radius: 12px; cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
    }
    .extract-btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .extract-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .reset-btn {
      padding: 0.8rem 1.2rem;
      background: var(--surface); border: 1px solid var(--border);
      color: var(--muted); font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem; border-radius: 12px; cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }
    .reset-btn:hover { color: var(--text); border-color: var(--muted); }

    /* ─── Stats Row ─── */
    .stats-row {
      width: 100%; max-width: 640px;
      display: none; gap: 0.75rem;
      margin-top: 1rem;
      z-index: 1;
      animation: fadeUp 0.4s ease both;
    }

    .stat-box {
      flex: 1; background: var(--surface);
      border: 1px solid var(--border); border-radius: 12px;
      padding: 0.85rem 1rem; text-align: center;
    }

    .stat-val {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem; letter-spacing: 0.05em;
      color: var(--accent); line-height: 1;
    }
    .stat-label { font-size: 0.7rem; color: var(--muted); margin-top: 0.2rem; letter-spacing: 0.08em; text-transform: uppercase; }

    /* ─── Frames Grid ─── */
    .frames-section {
      width: 100%; max-width: 1000px;
      margin-top: 2.5rem;
      display: none;
      z-index: 1;
      animation: fadeUp 0.5s ease both;
    }

    .frames-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 1rem;
    }

    .frames-header h3 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.5rem; letter-spacing: 0.08em;
    }

    .frames-header span { font-size: 0.8rem; color: var(--muted); }

    .download-all-btn {
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem; font-weight: 500;
      padding: 0.45rem 1rem; border-radius: 8px; cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      text-decoration: none; display: inline-block;
    }
    .download-all-btn:hover { border-color: var(--accent); background: rgba(232,255,71,0.05); color: var(--accent); }

    .frames-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 0.6rem;
    }

    .frame-item {
      position: relative; border-radius: 10px; overflow: hidden;
      background: var(--surface); border: 1px solid var(--border);
      aspect-ratio: 16/9;
      cursor: pointer;
      transition: transform 0.2s, border-color 0.2s;
      animation: popIn 0.3s ease both;
    }

    .frame-item:hover { transform: scale(1.04); border-color: var(--accent); }

    .frame-item img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .frame-num {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,0.7));
      font-size: 0.65rem; color: rgba(255,255,255,0.7);
      padding: 0.5rem 0.4rem 0.25rem;
      font-variant-numeric: tabular-nums;
    }

    .frame-item .dl-icon {
      position: absolute; top: 0.3rem; right: 0.3rem;
      background: rgba(0,0,0,0.6); border-radius: 5px;
      padding: 0.2rem 0.35rem; font-size: 0.65rem; color: white;
      opacity: 0; transition: opacity 0.2s;
      text-decoration: none;
    }
    .frame-item:hover .dl-icon { opacity: 1; }

    /* ─── Lightbox ─── */
    .lightbox {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.92);
      display: flex; align-items: center; justify-content: center;
      z-index: 999;
      opacity: 0; pointer-events: none;
      transition: opacity 0.25s;
    }
    .lightbox.open { opacity: 1; pointer-events: all; }
    .lightbox img { max-width: 90vw; max-height: 85vh; border-radius: 10px; }
    .lb-close {
      position: absolute; top: 1.5rem; right: 1.5rem;
      font-size: 1.5rem; color: white; cursor: pointer;
      background: rgba(255,255,255,0.1); border: none;
      width: 2.5rem; height: 2.5rem; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    .lb-close:hover { background: rgba(255,255,255,0.2); }
    .lb-nav {
      position: absolute; top: 50%; transform: translateY(-50%);
      background: rgba(255,255,255,0.08); border: none; color: white;
      font-size: 1.5rem; width: 3rem; height: 3rem;
      border-radius: 50%; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    .lb-nav:hover { background: rgba(255,255,255,0.18); }
    .lb-prev { left: 1.5rem; }
    .lb-next { right: 1.5rem; }
    .lb-info {
      position: absolute; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
      font-size: 0.8rem; color: rgba(255,255,255,0.5);
      font-variant-numeric: tabular-nums;
    }

    /* ─── Toast ─── */
    .toast {
      position: fixed; bottom: 2rem; left: 50%;
      transform: translateX(-50%) translateY(120%);
      padding: 0.7rem 1.4rem; border-radius: 100px;
      font-size: 0.84rem; font-weight: 600;
      transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
      z-index: 200; white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast-success { background: var(--green); color: #0a0a0f; }
    .toast-error { background: #ff5050; color: white; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(0.85); }
      to { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>

  <header>
    <h1>Drop & Play</h1>
    <p>Upload an MP4 · Extract frames · Browse results</p>
  </header>

  <!-- Upload Zone -->
  <div class="upload-area" id="dropZone">
    <span class="drop-icon">🎬</span>
    <h2>Drag your video here</h2>
    <p>Drop an <span>.mp4</span> file or click to browse</p>
    <button class="browse-btn" onclick="document.getElementById('file-input').click()">Browse Files</button>
    <input type="file" id="file-input" accept="video/mp4,.mp4" />
  </div>

  <!-- Settings -->
  <div class="settings-row" id="settingsRow" style="display:flex">
    <div class="setting-box">
      <label>Max Frames</label>
      <div style="display:flex;align-items:center;gap:0.75rem">
        <input type="range" id="maxFramesRange" min="10" max="1000" value="300" step="10" oninput="document.getElementById('maxFramesVal').textContent=this.value"/>
        <span class="setting-val" id="maxFramesVal">300</span>
      </div>
    </div>
  </div>

  <!-- File Card -->
  <div class="file-card" id="fileCard">
    <div class="file-thumb-wrap" id="thumbWrap">🎥</div>
    <div class="file-meta">
      <div class="file-name" id="fileName">—</div>
      <div class="file-size" id="fileSize">—</div>
    </div>
    <span class="status-badge badge-ready" id="statusBadge">Ready</span>
  </div>

  <!-- Progress -->
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-label">
      <span id="progressText">Uploading…</span>
      <span id="progressPct">—</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  </div>

  <!-- Action Row -->
  <div class="action-row" id="actionRow" style="display:flex">
    <button class="extract-btn" id="extractBtn">⚡ Extract Frames</button>
    <button class="reset-btn" id="resetBtn">✕ Remove</button>
  </div>

  <!-- Stats -->
  <div class="stats-row" id="statsRow">
    <div class="stat-box">
      <div class="stat-val" id="statFps">—</div>
      <div class="stat-label">FPS</div>
    </div>
    <div class="stat-box">
      <div class="stat-val" id="statDuration">—</div>
      <div class="stat-label">Duration (s)</div>
    </div>
    <div class="stat-box">
      <div class="stat-val" id="statExtracted">—</div>
      <div class="stat-label">Frames Extracted</div>
    </div>
    <div class="stat-box">
      <div class="stat-val" id="statTotal">—</div>
      <div class="stat-label">Total Frames</div>
    </div>
  </div>

  <!-- Frames Grid -->
  <div class="frames-section" id="framesSection">
    <div class="frames-header">
      <h3>Extracted Frames</h3>
      <span id="framesCountLabel"></span>
    </div>
    <div class="frames-grid" id="framesGrid"></div>
  </div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <button class="lb-close" onclick="closeLightbox()">✕</button>
    <button class="lb-nav lb-prev" onclick="lbNav(-1)">‹</button>
    <img id="lbImg" src="" alt="frame" />
    <button class="lb-nav lb-next" onclick="lbNav(1)">›</button>
    <div class="lb-info" id="lbInfo"></div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('file-input');
    const fileCard = document.getElementById('fileCard');
    const fileName = document.getElementById('fileName');
    const fileSize = document.getElementById('fileSize');
    const statusBadge = document.getElementById('statusBadge');
    const actionRow = document.getElementById('actionRow');
    const extractBtn = document.getElementById('extractBtn');
    const resetBtn = document.getElementById('resetBtn');
    const progressWrap = document.getElementById('progressWrap');
    const progressFill = document.getElementById('progressFill');
    const progressPct = document.getElementById('progressPct');
    const progressText = document.getElementById('progressText');
    const statsRow = document.getElementById('statsRow');
    const framesSection = document.getElementById('framesSection');
    const framesGrid = document.getElementById('framesGrid');
    const toast = document.getElementById('toast');
    const thumbWrap = document.getElementById('thumbWrap');

    let selectedFile = null;
    let currentJobId = null;
    let pollTimer = null;
    let allFrames = [];
    let lbIndex = 0;

    function fmt(bytes) {
      if (bytes < 1048576) return (bytes/1024).toFixed(1) + ' KB';
      if (bytes < 1073741824) return (bytes/1048576).toFixed(1) + ' MB';
      return (bytes/1073741824).toFixed(2) + ' GB';
    }

    function showToast(msg, type='success') {
      toast.textContent = msg;
      toast.className = `toast toast-${type} show`;
      setTimeout(() => toast.classList.remove('show'), 3500);
    }

    function setStatus(text, cls) {
      statusBadge.textContent = text;
      statusBadge.className = `status-badge ${cls}`;
    }

    function showFile(file) {
      if (!file || file.type !== 'video/mp4') {
        showToast('Please select a valid .mp4 file.', 'error'); return;
      }
      selectedFile = file;
      fileName.textContent = file.name;
      fileSize.textContent = fmt(file.size);
      setStatus('Ready', 'badge-ready');

      // Thumbnail
      const url = URL.createObjectURL(file);
      const vid = document.createElement('video');
      vid.src = url;
      vid.muted = true;
      vid.currentTime = 1;
      vid.style.cssText = 'width:100%;height:100%;object-fit:cover';
      vid.addEventListener('loadeddata', () => {
        thumbWrap.innerHTML = '';
        thumbWrap.appendChild(vid);
      }, { once: true });

      fileCard.style.display = 'flex';
      actionRow.style.display = 'flex';
      progressWrap.style.display = 'none';
      progressFill.style.width = '0%';
      framesSection.style.display = 'none';
      statsRow.style.display = 'none';
      framesGrid.innerHTML = '';
      extractBtn.disabled = false;
    }

    // Drag & Drop
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault(); dropZone.classList.remove('drag-over');
      showFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', () => showFile(fileInput.files[0]));

    // Extract
    extractBtn.addEventListener('click', async () => {
      if (!selectedFile) return;
      extractBtn.disabled = true;
      setStatus('Uploading', 'badge-uploading');
      progressWrap.style.display = 'block';
      progressText.textContent = 'Uploading video…';
      progressFill.style.width = '0%';
      progressPct.textContent = '0%';
      framesSection.style.display = 'none';
      statsRow.style.display = 'none';
      framesGrid.innerHTML = '';

      const formData = new FormData();
      formData.append('video', selectedFile);
      formData.append('max_frames', document.getElementById('maxFramesRange').value);

      const xhr = new XMLHttpRequest();
      xhr.open('POST', '/upload');

      xhr.upload.addEventListener('progress', e => {
        if (e.lengthComputable) {
          const pct = Math.round((e.loaded / e.total) * 100);
          progressFill.style.width = pct + '%';
          progressPct.textContent = pct + '%';
        }
      });

      xhr.addEventListener('load', () => {
        const data = JSON.parse(xhr.responseText);
        if (xhr.status !== 200 || data.error) {
          showToast(data.error || 'Upload failed', 'error');
          setStatus('Error', 'badge-error');
          extractBtn.disabled = false;
          return;
        }
        currentJobId = data.job_id;
        progressText.textContent = 'Extracting frames…';
        progressFill.style.width = '10%';
        progressPct.textContent = '';
        setStatus('Processing', 'badge-processing');
        pollStatus();
      });

      xhr.addEventListener('error', () => {
        showToast('Network error. Is the server running?', 'error');
        setStatus('Error', 'badge-error');
        extractBtn.disabled = false;
      });

      xhr.send(formData);
    });

    function pollStatus() {
      if (pollTimer) clearTimeout(pollTimer);
      fetch(`/status/${currentJobId}`)
        .then(r => r.json())
        .then(data => {
          if (data.total_video_frames) {
            const pct = Math.min(95, 10 + (data.extracted / Math.min(data.total_video_frames, parseInt(document.getElementById('maxFramesRange').value))) * 85);
            progressFill.style.width = pct + '%';
            progressPct.textContent = data.extracted + ' frames';
          }

          if (data.status === 'done') {
            onDone(data);
          } else if (data.status === 'error') {
            showToast('Error: ' + data.error, 'error');
            setStatus('Error', 'badge-error');
            extractBtn.disabled = false;
          } else {
            pollTimer = setTimeout(pollStatus, 600);
          }
        })
        .catch(() => { pollTimer = setTimeout(pollStatus, 1000); });
    }

    function onDone(data) {
      progressFill.style.width = '100%';
      progressPct.textContent = '✓';
      progressText.textContent = 'Complete!';
      setStatus('Done', 'badge-done');
      showToast(`✓ ${data.extracted} frames extracted!`);

      // Stats
      document.getElementById('statFps').textContent = data.fps ?? '—';
      document.getElementById('statDuration').textContent = data.duration ?? '—';
      document.getElementById('statExtracted').textContent = data.extracted ?? '—';
      document.getElementById('statTotal').textContent = data.total_video_frames ?? '—';
      statsRow.style.display = 'flex';

      // Frames
      allFrames = data.frames || [];
      renderFrames(allFrames);
      extractBtn.disabled = false;
    }

    function renderFrames(frames) {
      framesGrid.innerHTML = '';
      document.getElementById('framesCountLabel').textContent = `${frames.length} frames`;
      framesSection.style.display = 'block';

      frames.forEach((src, i) => {
        const item = document.createElement('div');
        item.className = 'frame-item';
        item.style.animationDelay = `${Math.min(i * 15, 300)}ms`;
        item.innerHTML = `
          <img src="${src}" alt="Frame ${i}" loading="lazy" />
          <div class="frame-num">Frame ${i.toString().padStart(3,'0')}</div>
          <a class="dl-icon" href="${src}" download title="Download">⬇</a>
        `;
        item.addEventListener('click', e => {
          if (e.target.classList.contains('dl-icon')) return;
          openLightbox(i);
        });
        framesGrid.appendChild(item);
      });
    }

    // Lightbox
    function openLightbox(idx) {
      lbIndex = idx;
      document.getElementById('lbImg').src = allFrames[idx];
      document.getElementById('lbInfo').textContent = `Frame ${idx + 1} / ${allFrames.length}`;
      document.getElementById('lightbox').classList.add('open');
    }
    function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); }
    function lbNav(dir) {
      lbIndex = (lbIndex + dir + allFrames.length) % allFrames.length;
      document.getElementById('lbImg').src = allFrames[lbIndex];
      document.getElementById('lbInfo').textContent = `Frame ${lbIndex + 1} / ${allFrames.length}`;
    }
    document.getElementById('lightbox').addEventListener('click', e => {
      if (e.target === e.currentTarget) closeLightbox();
    });
    document.addEventListener('keydown', e => {
      if (!document.getElementById('lightbox').classList.contains('open')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowRight') lbNav(1);
      if (e.key === 'ArrowLeft') lbNav(-1);
    });

    // Reset
    resetBtn.addEventListener('click', () => {
      if (pollTimer) clearTimeout(pollTimer);
      selectedFile = null; currentJobId = null; allFrames = [];
      fileInput.value = '';
      fileCard.style.display = 'none';
      actionRow.style.display = 'none';
      progressWrap.style.display = 'none';
      statsRow.style.display = 'none';
      framesSection.style.display = 'none';
      thumbWrap.innerHTML = '🎥';
      progressFill.style.width = '0%';
    });
  </script>
</body>
</html>
